name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Token-waste guard: only respond to @claude mentions from the repo
    # owner or someone with explicit write access. Drive-by mentions from
    # random forkers / first-time contributors / NONE-association users
    # are silently ignored. To grant access to a new contributor, add
    # them as a repository collaborator (Settings → Collaborators).
    if: |
      (
        github.event_name == 'issue_comment'
        && contains(github.event.comment.body, '@claude')
        && contains(fromJSON('["OWNER","COLLABORATOR","MEMBER"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review_comment'
        && contains(github.event.comment.body, '@claude')
        && contains(fromJSON('["OWNER","COLLABORATOR","MEMBER"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review'
        && contains(github.event.review.body, '@claude')
        && contains(fromJSON('["OWNER","COLLABORATOR","MEMBER"]'), github.event.review.author_association)
      ) ||
      (
        github.event_name == 'issues'
        && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))
        && contains(fromJSON('["OWNER","COLLABORATOR","MEMBER"]'), github.event.issue.author_association)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@5d5c10a4f389689f992ea10bb14dcb6fcc83146d # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
