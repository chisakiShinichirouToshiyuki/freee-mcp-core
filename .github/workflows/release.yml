name: Release

on:
  push:
    branches: [main]
  # Manual fallback: GITHUB_TOKEN-attributed commits (e.g. merges of the
  # Release PR auto-created by changesets/action) do NOT trigger workflows
  # by GitHub design (avoids infinite loops). When that happens the
  # publish step never runs from `push`. This dispatch lets us re-fire
  # the workflow against main on demand.
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # Use RELEASE_PAT so commits/pushes by changesets/action are
          # attributed to a real user rather than github-actions[bot].
          # Bot-attributed pushes don't trigger downstream workflows by
          # GitHub design — using a PAT lets the merged Release PR fire
          # release.yml again and run the publish step automatically.
          token: ${{ secrets.RELEASE_PAT }}
          persist-credentials: true
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .tool-versions
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build project
        run: bun run build
      # changesets/action behavior:
      #   - If unconsumed `.changeset/*.md` files exist → opens/updates a
      #     "Release PR" that bumps versions and consumes the changesets.
      #   - If no unconsumed changesets (i.e. the Release PR was just merged)
      #     → runs `publish` to push tags + npm publish.
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1
        with:
          version: bun run version
          publish: bun run release
          title: "chore: release packages"
          commit: "chore: release packages"
          setupGitUser: true
          commitMode: git-cli
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          # Trusted Publishing (OIDC). No NPM_TOKEN required — npm verifies
          # the GitHub Actions OIDC token against the trusted publisher
          # configured at https://www.npmjs.com/package/freee-mcp-core/access
          # The `id-token: write` permission above lets us mint that OIDC
          # token. NPM_CONFIG_PROVENANCE adds a signed provenance attestation
          # that links each published version to this workflow run.
          NPM_CONFIG_PROVENANCE: "true"
      - name: Add release label to PR
        if: steps.changesets.outputs.pullRequestNumber != ''
        run: gh pr edit ${{ steps.changesets.outputs.pullRequestNumber }} --add-label release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
